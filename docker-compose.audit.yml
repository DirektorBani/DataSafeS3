# Feature-audit overlay: headroom for login rate limit and outbound sink tests.
# Usage (Windows local dev):
#   docker compose -p datasafe --profile postgres \
#     -f docker-compose.yml \
#     -f docker-compose.local-data.yml \
#     -f docker-compose.local-binary.yml \
#     -f docker-compose.audit.yml \
#     up -d storage-server
#
# With strict security QA, combine with docker-compose.security-test.yml but keep audit rate limit:
#   STORAGE_RATE_LIMIT_LOGIN=500 in .env or this file overrides security-test default (5).
services:
  storage-server:
    environment:
      - STORAGE_RATE_LIMIT_LOGIN=${STORAGE_RATE_LIMIT_LOGIN:-500}
      - STORAGE_RATE_LIMIT_WINDOW=${STORAGE_RATE_LIMIT_WINDOW:-1m}
      - STORAGE_OUTBOUND_HTTP_ALLOW=${STORAGE_OUTBOUND_HTTP_ALLOW:-true}
      - STORAGE_DEV=${STORAGE_DEV:-true}
