# Production-oriented overrides for DataSafeS3 Helm chart
replicaCount: 2

storageServer:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

postgres:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

console:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: datasafe-tls
      hosts:
        - datasafe.example.com

# Required secrets — replace placeholders before deploy (see values.yaml storageServer.secrets).
storageServer:
  secrets:
    jwtSecret: ""          # required — min 32 random chars
    secretKey: ""          # required — S3 SigV4 secret
    adminPassword: ""      # required — console admin password
    sseMasterKey: ""       # optional — SSE-S3 master key
  env:
    STORAGE_DEV: "false"
    STORAGE_STRICT_SECRETS: "true"
    STORAGE_OIDC_ROPC_ENABLED: "false"
    STORAGE_LDAP_REQUIRE_TLS: "true"
    # STORAGE_CORS_ALLOWED_ORIGINS: "https://datasafe.example.com"
    # STORAGE_MFA_ENCRYPTION_KEY: ""

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: storage-server
          topologyKey: kubernetes.io/hostname
