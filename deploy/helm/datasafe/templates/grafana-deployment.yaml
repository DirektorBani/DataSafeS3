{{- if .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "datasafe.grafana.fullname" . }}-datasources
  labels:
    {{- include "datasafe.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "datasafe.prometheus.fullname" . }}:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "datasafe.grafana.fullname" . }}-dashboards-provider
  labels:
    {{- include "datasafe.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  default.yml: |
    apiVersion: 1
    providers:
      - name: DataSafeS3
        orgId: 1
        folder: DataSafeS3
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
{{- if or (.Files.Get "dashboards/datasafe-overview.json") (.Files.Get "dashboards/datasafe-buckets.json") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "datasafe.grafana.fullname" . }}-dashboard
  labels:
    {{- include "datasafe.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
binaryData: {}
data:
{{- if (.Files.Get "dashboards/datasafe-overview.json") }}
  datasafe-overview.json: |
{{ .Files.Get "dashboards/datasafe-overview.json" | indent 4 }}
{{- end }}
{{- if (.Files.Get "dashboards/datasafe-buckets.json") }}
  datasafe-buckets.json: |
{{ .Files.Get "dashboards/datasafe-buckets.json" | indent 4 }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datasafe.grafana.fullname" . }}
  labels:
    {{- include "datasafe.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: {{ .Values.monitoring.grafana.adminUser | quote }}
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.monitoring.grafana.adminPassword | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datasafe.grafana.fullname" . }}
  labels:
    {{- include "datasafe.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "datasafe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "datasafe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: grafana
          image: {{ include "datasafe.image" (dict "global" .Values.global "image" .Values.monitoring.grafana.image) }}
          imagePullPolicy: {{ .Values.monitoring.grafana.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          envFrom:
            - secretRef:
                name: {{ include "datasafe.grafana.fullname" . }}
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            {{- if or (.Files.Get "dashboards/datasafe-overview.json") (.Files.Get "dashboards/datasafe-buckets.json") }}
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards
            {{- end }}
          resources:
            {{- toYaml .Values.monitoring.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: {{ include "datasafe.grafana.fullname" . }}-datasources
        - name: dashboards-provider
          configMap:
            name: {{ include "datasafe.grafana.fullname" . }}-dashboards-provider
        {{- if or (.Files.Get "dashboards/datasafe-overview.json") (.Files.Get "dashboards/datasafe-buckets.json") }}
        - name: dashboard
          configMap:
            name: {{ include "datasafe.grafana.fullname" . }}-dashboard
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "datasafe.grafana.fullname" . }}
  labels:
    {{- include "datasafe.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      name: http
  selector:
    {{- include "datasafe.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
{{- end }}
