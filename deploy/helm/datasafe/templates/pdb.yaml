{{- if and .Values.storageServer.podDisruptionBudget.enabled (gt (int .Values.replicaCount) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "datasafe.fullname" . }}-storage-server
  labels:
    {{- include "datasafe.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.storageServer.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "datasafe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: storage-server
{{- end }}
