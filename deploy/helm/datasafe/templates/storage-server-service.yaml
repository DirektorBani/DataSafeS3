apiVersion: v1
kind: Service
metadata:
  name: {{ include "datasafe.storageServer.fullname" . }}
  labels:
    {{- include "datasafe.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-server
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "datasafe.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: storage-server
