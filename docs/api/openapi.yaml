openapi: 3.1.0
info:
  title: DataSafeS3 Community Integration API
  version: 1.0.0
  summary: Machine-facing JSON REST API for integrators (subset of /api/v1)
  description: |
    **DataSafeS3 Community edition** — JSON REST Integration API for machine clients and integrators.

    ## Authentication
    Use an **API token** (prefix ds_*) in header Authorization Bearer ds_...
    Create tokens in the web console: **Access → API tokens → Create** (human login once).

    ## Out of scope
    - Admin routes (users, system settings, webhooks, tenants, gateway) — see openapi-full.yaml
    - AWS **S3 XML API** (SigV4) on port **9000** — use AWS SDKs

    ## Errors
    JSON object with error field; delete may return scheduled_delete_at, trashed, trash_id.

    Docs: [Swagger UI guide](../../docs/en/api/swagger.md) · [Full API spec](../../api/openapi-full.yaml)
  contact:
    name: DataSafeS3 / Ilya Trachuk
    url: https://github.com/DirektorBani/DataSafeS3
  license:
    name: Apache 2.0
    identifier: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080/api/v1
    description: Console origin via Caddy (Swagger UI at /api/v1/docs)
  - url: http://localhost:9000/api/v1
    description: storage-server direct

security:
  - BearerAPIToken: []

components:
  securitySchemes:
    BearerAPIToken:
      type: http
      scheme: bearer
      bearerFormat: ds_
      description: |
        Integration API token with prefix ds_. Create in console: Access → API tokens.
        Inherits creator's role and bucket access.

  parameters:
    BucketName:
      name: bucket
      in: path
      required: true
      schema: { type: string }
    ObjectKey:
      name: key
      in: path
      required: true
      schema: { type: string }
      description: Object key (may contain slashes)
    Offset:
      name: offset
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 1000, default: 50 }
    Prefix:
      name: prefix
      in: query
      schema: { type: string }
    Delimiter:
      name: delimiter
      in: query
      schema: { type: string, example: "/" }
    StartAfter:
      name: start_after
      in: query
      schema: { type: string }
    MaxKeys:
      name: max_keys
      in: query
      schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
        mfa_required: { type: boolean }
        mfa_token: { type: string }
        mfa_setup_required: { type: boolean }
        scheduled_delete_at: { type: string, format: date-time }
        trashed: { type: boolean }
        trash_id: { type: string }

    HealthStatus:
      type: object
      properties:
        status: { type: string, example: ok }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
        mfa_code: { type: string }

    LoginResponse:
      type: object
      properties:
        token: { type: string }
        expires_in: { type: integer, example: 86400 }
        username: { type: string }
        role: { type: string, enum: [administrator, operator, user] }
        user_id: { type: string }
        mfa_enabled: { type: boolean }
        mfa_required: { type: boolean }
        mfa_token: { type: string }

    MFALoginRequest:
      type: object
      required: [mfa_token, mfa_code]
      properties:
        mfa_token: { type: string }
        mfa_code: { type: string }

    MeResponse:
      type: object
      properties:
        username: { type: string }
        email: { type: string }
        role: { type: string }
        status: { type: string }
        user_id: { type: string }
        tenant_id: { type: string }
        mfa_enabled: { type: boolean }
        auth_source: { type: string }
        is_tenant_admin: { type: boolean }
        tenant_memberships:
          type: array
          items:
            type: object
            properties:
              tenant_id: { type: string }
              tenant_name: { type: string }
              role: { type: string }

    Bucket:
      type: object
      properties:
        name: { type: string }
        storage_key: { type: string }
        owner: { type: string }
        owner_id: { type: string }
        tenant_id: { type: string }
        created_at: { type: string, format: date-time }
        visibility: { type: string, enum: [private, public-read] }
        access:
          type: object
          properties:
            ownership: { type: string, enum: [owned, shared, tenant] }
            can_read: { type: boolean }
            can_write: { type: boolean }
            shared_by: { type: string, nullable: true }
        versioning_enabled: { type: boolean }
        object_lock_enabled: { type: boolean }
        description: { type: string }
        tags: { type: object, additionalProperties: { type: string } }

    Object:
      type: object
      properties:
        bucket: { type: string }
        key: { type: string }
        size: { type: integer, format: int64 }
        etag: { type: string }
        content_type: { type: string }
        version_id: { type: string }
        last_modified: { type: string, format: date-time }
        legal_hold: { type: boolean }
        retention_until: { type: string, format: date-time }
        metadata: { type: object, additionalProperties: { type: string } }
        tags: { type: object, additionalProperties: { type: string } }

    ObjectListResponse:
      type: object
      properties:
        objects:
          type: array
          items: { $ref: '#/components/schemas/Object' }
        folders:
          type: array
          items: { type: string }
        truncated: { type: boolean }
        next_marker: { type: string }

    AccessKey:
      type: object
      properties:
        access_key: { type: string }
        label: { type: string }
        owner: { type: string }
        created_at: { type: string, format: date-time }

    ShareLink:
      type: object
      properties:
        id: { type: string }
        bucket: { type: string }
        key: { type: string }
        token: { type: string }
        max_downloads: { type: integer }
        download_count: { type: integer }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }

    APIToken:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        username: { type: string }
        scopes:
          type: array
          items: { type: string }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    OkResponse:
      type: object
      properties:
        ok: { type: boolean }

    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string }
        role: { type: string, enum: [administrator, operator, user] }
        status: { type: string }
        tenant_id: { type: string }
        mfa_enabled: { type: boolean }

    CreateShareRequest:
      type: object
      required: [key]
      properties:
        key: { type: string, description: Object key to share }
        expires_in_sec: { type: integer, minimum: 0, description: "TTL; 0 = no expiry" }
        max_downloads: { type: integer, minimum: 0, default: 0 }

    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        expires_days: { type: integer, minimum: 1, default: 90 }
        scopes: { type: array, items: { type: string } }

    CreateTokenResponse:
      type: object
      properties:
        id: { type: string }
        token: { type: string, description: Plain token shown once }
        name: { type: string }
        expires_at: { type: string, format: date-time }

    PresignRequest:
      type: object
      required: [bucket, key]
      properties:
        method: { type: string, enum: [GET, PUT, HEAD, DELETE], default: GET }
        bucket: { type: string }
        key: { type: string }
        expires_seconds: { type: integer, minimum: 1, default: 3600 }
        endpoint: { type: string, format: uri, description: S3 base URL, default request Host }

    PresignResponse:
      type: object
      properties:
        url: { type: string, format: uri }

    CreateKeyRequest:
      type: object
      properties:
        label: { type: string }

    CreateKeyResponse:
      type: object
      properties:
        access_key: { type: string }
        secret_key: { type: string, description: Shown once }
        label: { type: string }

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string, format: password }
        new_password: { type: string, format: password, minLength: 6 }

    HooksTestRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        event: { type: string, example: extension.test }
        secret: { type: string }

    BulkDeleteRequest:
      type: object
      required: [keys]
      properties:
        keys: { type: array, items: { type: string }, minItems: 1 }

    TagsMap:
      type: object
      additionalProperties: { type: string }

    LifecycleRules:
      type: object
      properties:
        rules:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              prefix: { type: string }
              enabled: { type: boolean }
              expiration_days: { type: integer }

  examples:
    HealthOk:
      value: { status: ok }
    ErrorUnauthorized:
      value: { error: unauthorized }
    CreateShareBody:
      value: { key: reports/2024/q1.pdf, expires_in_sec: 86400, max_downloads: 10 }

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    InternalError:
      description: Server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [Health]
      x-community: true
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }

  /me:
    get:
      operationId: getMe
      summary: Current user profile
      tags: [Profile]
      x-community: true
      security:
        - BearerAPIToken: []
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /me/password:
    post:
      operationId: changePassword
      summary: Change password
      tags: [Profile]
      x-community: true
      security:
        - BearerAPIToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /me/mfa/webauthn/register/begin:
    post:
      operationId: webauthnRegisterBegin
      summary: Begin WebAuthn passkey enrollment
      tags: [Profile]
      x-community: true
      security:
        - BearerAPIToken: []
      responses:
        '200': { description: PublicKeyCredentialCreationOptions JSON }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /me/mfa/webauthn/register/finish:
    post:
      operationId: webauthnRegisterFinish
      summary: Finish WebAuthn passkey enrollment
      tags: [Profile]
      x-community: true
      security:
        - BearerAPIToken: []
      responses:
        '200': { description: Passkey enrolled }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /buckets:
    get:
      operationId: listBuckets
      summary: List buckets
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - name: filter
            in: query
            schema: { type: string, enum: [owned, shared, tenant, all] }
            description: Filter by access.ownership (default all)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  buckets:
                    type: array
                    items: { $ref: '#/components/schemas/Bucket' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /buckets/{bucket}:
    post:
      operationId: createBucket
      summary: Create bucket
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      responses:
        '201':
          description: Created with visibility
          content:
            application/json:
              schema:
                type: object
                properties:
                  bucket: { type: string }
                  visibility: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    delete:
      operationId: deleteBucket
      summary: Delete empty bucket
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /buckets/{bucket}/access:
    get:
      operationId: listBucketAccessByBucket
      summary: List bucket access grants (owner or tenant admin)
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      responses:
        '200': { description: Grants }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      operationId: putBucketAccessByBucket
      summary: Replace bucket access grants
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      responses:
        '200': { description: Updated }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /buckets/{bucket}/access/{user_id}:
    delete:
      operationId: deleteBucketAccessByBucket
      summary: Revoke bucket access for user
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
          - name: user_id
            in: path
            required: true
            schema: { type: string }
      responses:
        '204': { description: Revoked }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /shareable-users:
    get:
      operationId: listShareableUsers
      summary: Users that can receive bucket grants
      tags: [Shares]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - name: bucket
            in: query
            required: true
            schema: { type: string }
          - name: q
            in: query
            schema: { type: string }
            description: Username search (max 50 results)
      responses:
        '200': { description: Users }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notifications:
    get:
      operationId: listNotifications
      summary: In-app notifications for current user
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      responses:
        '200': { description: Notifications }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      summary: Mark notification as read
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - name: id
            in: path
            required: true
            schema: { type: string }
      responses:
        '204': { description: Read }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all notifications read
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      responses:
        '204': { description: Read }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /recent:
    get:
      operationId: listRecent
      summary: Recently accessed buckets and folders
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      responses:
        '200': { description: Recent items }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /buckets/{bucket}/objects:
    get:
      operationId: listObjects
      summary: List objects
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
          - $ref: '#/components/parameters/Prefix'
          - $ref: '#/components/parameters/Delimiter'
          - $ref: '#/components/parameters/StartAfter'
          - $ref: '#/components/parameters/MaxKeys'
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /buckets/{bucket}/versions:
    get:
      operationId: listObjectVersions
      summary: List object versions
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      responses:
        '200': { description: Version list }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /buckets/{bucket}/settings:
    get:
      operationId: getBucketSettings
      summary: Get bucket settings
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      responses:
        '200': { description: Bucket settings }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /buckets/{bucket}/object-meta:
    get:
      operationId: getObjectMeta
      summary: Get object metadata
      tags: [Search]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
          - name: key
            in: query
            required: true
            schema: { type: string }
      responses:
        '200': { description: Object metadata }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      operationId: putObjectMeta
      summary: Update object metadata
      tags: [Search]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      responses:
        '200': { description: Updated }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /buckets/{bucket}/folders:
    post:
      operationId: createFolder
      summary: Create folder placeholder
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      responses:
        '201': { description: Folder created }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    delete:
      operationId: deleteFolder
      summary: Delete folder
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      responses:
        '200': { description: Deleted or conflict with object_count }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /buckets/{bucket}/bulk-delete:
    post:
      operationId: bulkDeleteObjects
      summary: Bulk delete objects
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkDeleteRequest' }
      responses:
        '200': { description: Bulk result }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /buckets/{bucket}/object-actions:
    post:
      operationId: objectActions
      summary: Batch object actions
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
      responses:
        '200': { description: Action results }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /buckets/{bucket}/objects/{key}:
    get:
      operationId: downloadObject
      summary: Download object
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
          - $ref: '#/components/parameters/ObjectKey'
      responses:
        '200':
          description: Object bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      operationId: uploadObject
      summary: Upload object
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
          - $ref: '#/components/parameters/BucketName'
          - $ref: '#/components/parameters/ObjectKey'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  object: { $ref: '#/components/schemas/Object' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    delete:
      operationId: deleteObject
      summary: Delete or schedule delete object
      tags: [Buckets]
      x-community: true
      security:
        - BearerAPIToken: []
      parameters:
