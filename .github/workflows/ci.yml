name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: gofmt
        run: |
          test -z "$(gofmt -l .)" || (echo "gofmt issues:" && gofmt -l . && exit 1)
      - name: govet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: datasafe
          POSTGRES_PASSWORD: datasafe
          POSTGRES_DB: datasafe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datasafe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: go test
        env:
          TEST_POSTGRES_DSN: postgres://datasafe:datasafe@localhost:5432/datasafe?sslmode=disable
        run: go test ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  web-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: build console
        working-directory: web/console
        run: |
          npm ci
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker build (server)
        run: docker build -f deploy/docker/Dockerfile .

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [test, web-console, docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build console for compose Caddy
        working-directory: web/console
        run: |
          npm ci
          npm run build
      - name: Start compose stack for E2E
        env:
          DATASAFE_DATA_ROOT: ${{ github.workspace }}/.datasafe-data-ci
        run: |
          mkdir -p "$DATASAFE_DATA_ROOT/storage" "$DATASAFE_DATA_ROOT/postgres"
          docker compose -p datasafe-ci \
            -f docker-compose.yml \
            -f docker-compose.local-data.yml \
            --profile postgres up -d --build --wait storage-server caddy postgres 2>/dev/null \
            || docker compose -p datasafe-ci \
              -f docker-compose.yml \
              -f docker-compose.local-data.yml \
              --profile postgres up -d --build storage-server caddy postgres
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8080/healthz; then exit 0; fi
            sleep 2
          done
          echo "Stack did not become healthy in time"
          docker compose -p datasafe-ci -f docker-compose.yml -f docker-compose.local-data.yml ps
          exit 1
      - name: Install Playwright
        working-directory: web/console
        run: npx playwright install chromium --with-deps
      - name: E2E smoke
        working-directory: web/console
        run: npx playwright test e2e/smoke.spec.ts
      - name: Tear down
        if: always()
        run: |
          docker compose -p datasafe-ci \
            -f docker-compose.yml \
            -f docker-compose.local-data.yml \
            --profile postgres down -v --remove-orphans
