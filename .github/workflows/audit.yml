name: feature-audit

on:
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    paths:
      - "internal/**"
      - "scripts/feature-audit-test.ps1"
      - "scripts/vault/**"
      - "deploy/vault/**"
      - "docker-compose.yml"
      - "docker-compose.vault.yml"
      - ".github/workflows/audit.yml"
  workflow_dispatch:

jobs:
  feature-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start core compose stack
        run: |
          docker compose -p datasafe-audit up -d --build --wait storage-server caddy postgres 2>/dev/null \
            || docker compose -p datasafe-audit --profile postgres up -d --build --wait storage-server caddy postgres
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8080/healthz; then exit 0; fi
            sleep 2
          done
          docker compose -p datasafe-audit ps
          exit 1

      - name: Run feature-audit (API smoke subset)
        run: |
          pwsh -File scripts/feature-audit-test.ps1 -BaseUrl http://127.0.0.1:8080/api/v1
        continue-on-error: false

      - name: Tear down
        if: always()
        run: docker compose -p datasafe-audit down -v --remove-orphans

  vault-integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vault injection integration smoke
        run: |
          chmod +x scripts/vault/smoke-vault-integration.sh
          VAULT_PROFILE=1 ./scripts/vault/smoke-vault-integration.sh

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Go vault-tagged tests
        run: |
          export TEST_VAULT_ADDR=http://127.0.0.1:8200
          export VAULT_PROFILE=1
          export STORAGE_URL=http://127.0.0.1:9000
          go test -tags=vault ./internal/security/ -run VaultInjection -count=1

      - name: Tear down vault stack
        if: always()
        run: |
          docker compose -p datasafe-vault --profile postgres --profile vault \
            -f docker-compose.yml -f docker-compose.vault.yml down -v --remove-orphans
